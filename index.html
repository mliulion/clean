<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clean Tool</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <!-- IZQUIERDA -->
  <div class="left">
    <button id="resetBtn">Reset</button>
    <button id="exportBtn">Exportar</button>
    <input type="file" id="importFile" accept=".json">
    <input type="password" id="passwordInput" placeholder="Clave">
    <button id="unlockBtn">Desbloquear</button>
    <table id="tabla">
      <tbody>
        <!-- filas dinámicas -->
      </tbody>
    </table>
  </div>

  <!-- DERECHA -->
  <div class="right">
    <textarea id="textarea_input" placeholder="Input"></textarea>
    <textarea id="textarea_output" placeholder="Output"></textarea>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
